services:
  app:
    build: .
    container_name: consultorio-equilibrium
    restart: unless-stopped
    env_file: .env
    networks:
      - portainer_default
    volumes:
      # Calibração dos pontos de acupuntura — persiste entre deploys
      - /var/www/ConsultorioEquilibrium/data/acu-points-calibrated.json:/app/public/js/acu-points-calibrated.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.consultorio-equilibrium.rule=Host(`consultorioequilibrium.datawavebr.com`)"
      - "traefik.http.routers.consultorio-equilibrium.entrypoints=websecure"
      - "traefik.http.routers.consultorio-equilibrium.tls.certresolver=leresolver"
      - "traefik.http.services.consultorio-equilibrium.loadbalancer.server.port=3000"

networks:
  portainer_default:
    external: true
