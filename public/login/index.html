<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso — Painel da Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'DM Sans', sans-serif; color:#fff; padding:1.5rem;
    background: linear-gradient(135deg, #1a0533, #0d1f45, #0d3b5e, #1a1240);
    background-size:400% 400%; animation:bg 16s ease infinite;
  }
  @keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .card {
    width:100%; max-width:400px;
    background:rgba(20,20,30,0.72); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.1); border-radius:24px;
    padding:2.5rem 2rem; box-shadow:0 30px 80px rgba(0,0,0,0.5);
  }
  .brand { font-family:'Playfair Display', serif; font-weight:300; font-size:1.6rem; text-align:center; margin-bottom:0.3rem; }
  .sub { text-align:center; color:rgba(255,255,255,0.45); font-size:0.85rem; margin-bottom:2rem; letter-spacing:0.04em; }
  .field { margin-bottom:1rem; }
  label { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.4); margin-bottom:0.4rem; }
  input {
    width:100%; padding:0.8rem 1rem; border-radius:12px; color:#fff;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14);
    font-family:'DM Sans', sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s;
  }
  input:focus { border-color:rgba(255,255,255,0.35); }
  .btn {
    width:100%; padding:0.9rem; margin-top:0.6rem; border:none; border-radius:60px;
    background:linear-gradient(135deg,#7b3fa0,#3a6fa8); color:#fff;
    font-family:'DM Sans', sans-serif; font-size:1rem; font-weight:500; cursor:pointer;
    transition:opacity 0.2s, transform 0.15s;
  }
  .btn:hover { opacity:0.92; transform:translateY(-1px); }
  .btn:disabled { opacity:0.5; cursor:default; transform:none; }
  .msg { min-height:1.2em; text-align:center; font-size:0.85rem; margin-top:1rem; }
  .msg.err { color:#f0a0a0; }
  .setup-note { background:rgba(120,80,200,0.14); border:1px solid rgba(120,80,200,0.3); color:#c9b8ef; border-radius:12px; padding:0.7rem 0.9rem; font-size:0.8rem; line-height:1.5; margin-bottom:1.5rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Consultório de Fisioterapia</div>
    <div class="sub" id="mode-sub">Acesso da profissional</div>

    <div class="setup-note" id="setup-note" style="display:none">
      Primeiro acesso — crie a conta da profissional. As próximas vezes serão só login.
    </div>

    <form id="form">
      <div class="field" id="name-field" style="display:none">
        <label>Nome</label>
        <input type="text" id="name" autocomplete="name" placeholder="Seu nome">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" autocomplete="username" placeholder="voce@exemplo.com" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button class="btn" id="submit" type="submit">Entrar</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

<script>
let needsSetup = false

async function init() {
  try {
    const r = await fetch('/api/auth/status')
    const s = await r.json()
    if (s.authenticated) { location.href = '/doctor'; return }
    needsSetup = !!s.needsSetup
  } catch (_) {}
  applyMode()
}

function applyMode() {
  document.getElementById('name-field').style.display  = needsSetup ? 'block' : 'none'
  document.getElementById('setup-note').style.display  = needsSetup ? 'block' : 'none'
  document.getElementById('mode-sub').textContent      = needsSetup ? 'Criar conta' : 'Acesso da profissional'
  document.getElementById('submit').textContent        = needsSetup ? 'Criar conta e entrar' : 'Entrar'
  document.getElementById('password').setAttribute('autocomplete', needsSetup ? 'new-password' : 'current-password')
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const btn = document.getElementById('submit')
  const msg = document.getElementById('msg')
  msg.className = 'msg'; msg.textContent = ''
  const name = document.getElementById('name').value.trim()
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value

  btn.disabled = true
  btn.textContent = needsSetup ? 'Criando...' : 'Entrando...'
  try {
    const url = needsSetup ? '/api/auth/setup' : '/api/auth/login'
    const body = needsSetup ? { name, email, password } : { email, password }
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) })
    const data = await r.json()
    if (!r.ok) throw new Error(data.error || 'Falha no acesso')
    location.href = '/doctor'
  } catch (err) {
    msg.className = 'msg err'
    msg.textContent = err.message
    btn.disabled = false
    applyMode()
  }
})

init()
</script>
</body>
</html>
