<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Formulário de Chegada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    width: 100vw; min-height: 100dvh; overflow-x: hidden;
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    transition: background 0.8s ease;
  }

  /* ── Temas por pergunta ── */
  body.q1 { background: linear-gradient(160deg, #060d1f 0%, #0d1f45 55%, #1a1240 100%); }
  body.q2 { background: linear-gradient(160deg, #1a0a0a 0%, #3d1515 55%, #2a0a1e 100%); }
  body.q3 { background: linear-gradient(160deg, #0f2027 0%, #203a43 55%, #2c5364 100%); }
  body.q4 { background: linear-gradient(160deg, #1a1040 0%, #2d1b5e 55%, #1a2850 100%); }
  body.q5 { background: linear-gradient(160deg, #05231a 0%, #0d3f2e 55%, #0a2f3f 100%); }
  body.done-state { background: linear-gradient(160deg, #0a1a0a 0%, #1a3a1a 55%, #0f2a1a 100%); }

  /* ── Pagamento / Pix ── */
  .pay-amount-top {
    text-align: center; margin-bottom: 1.5rem;
  }
  .pay-amount-top .lbl {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.4);
  }
  .pay-amount-top .val {
    font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 300;
    color: #fff; margin-top: 0.2rem;
  }
  .pay-panel {
    background: #fff; border-radius: 20px; padding: 1.3rem 1.1rem;
    margin-top: 1.2rem; text-align: center;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    animation: pop-in 0.35s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .pay-panel img { width: min(220px, 58vw); height: auto; border-radius: 10px; }
  .pay-panel .hint { font-size: 0.85rem; color: #4a5b6b; margin-top: 0.6rem; line-height: 1.5; }
  .pay-copy-btn {
    width: 100%; padding: 0.9rem; margin-top: 0.9rem;
    border: none; border-radius: 60px;
    background: #0b6b4a; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .pay-copy-btn:active { background: #085038; }
  .pay-copy-btn.copied { background: #12a06f; }
  .pay-key {
    margin-top: 0.9rem; padding-top: 0.9rem;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 0.8rem; color: #55677a; line-height: 1.6; word-break: break-all;
  }
  .pay-key b { color: #16324a; }
  .pay-done-btn {
    width: 100%; padding: 0.9rem; margin-top: 1rem;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 60px;
    background: rgba(255,255,255,0.14); color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer;
  }
  .pay-done-btn.done {
    background: rgba(76,175,134,0.95); border-color: transparent; font-weight: 500;
  }
  .pay-help {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px; padding: 1rem; margin-top: 1.2rem;
    font-size: 0.92rem; line-height: 1.55; color: rgba(255,255,255,0.9);
  }
  .pay-confirmed {
    background: rgba(76,175,134,0.9); border-radius: 16px;
    padding: 1.3rem; margin-top: 1.2rem; text-align: center;
    font-size: 1.15rem; font-weight: 500; color: #fff; line-height: 1.5;
    animation: pop-in 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .pay-confirmed span { font-size: 0.9rem; font-weight: 400; opacity: 0.9; }
  .pay-waiting {
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    margin-top: 1.1rem; font-size: 0.9rem; color: rgba(255,255,255,0.6);
  }
  .pay-waiting .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.55);
    animation: dot-bounce 1.3s ease-in-out infinite;
  }
  .pay-waiting .dot:nth-child(2) { animation-delay: 0.18s; }
  .pay-waiting .dot:nth-child(3) { animation-delay: 0.36s; margin-right: 0.4rem; }
  @keyframes dot-bounce {
    0%,70%,100% { opacity: 0.3; transform: scale(0.8); }
    35%         { opacity: 1;   transform: scale(1.2); }
  }

  /* ── Progresso ── */
  .progress-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.6);
    transition: width 0.5s ease;
  }

  /* ── Decorações animadas por tema ── */
  .decor { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }

  /* Q1: estrelas + lua */
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.15; transform:scale(1); }
    50% { opacity:0.95; transform:scale(1.5); }
  }
  .moon {
    position: absolute; top: 8%; right: 12%;
    width: 80px; height: 80px;
  }
  .moon-body {
    width: 80px; height: 80px;
    background: #ffd77a;
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(255,215,122,0.5);
    position: relative;
  }
  .moon-shadow {
    position: absolute; top: -8px; left: -12px;
    width: 80px; height: 80px;
    background: #0d1f45;
    border-radius: 50%;
  }
  .cloud {
    position: absolute;
    background: rgba(30,50,100,0.6);
    border-radius: 60px;
  }

  /* Q2: anéis pulsantes */
  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(220,50,50,0.4);
    animation: pulse-out 2s ease-out infinite;
  }
  @keyframes pulse-out {
    0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
  }
  .pulse-center {
    position: absolute; left: 50%; top: 45%;
    width: 60px; height: 60px;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(220,50,50,0.3), transparent 70%);
    border-radius: 50%;
  }

  /* Q3: ondas */
  .wave {
    position: absolute; bottom: 0; left: -20%;
    width: 140%; height: 120px;
    background: rgba(20,80,120,0.25);
    border-radius: 50%;
    animation: wave-move 8s ease-in-out infinite alternate;
  }
  @keyframes wave-move {
    from { transform: translateX(0) scaleY(1); }
    to { transform: translateX(5%) scaleY(1.1); }
  }

  /* Q4: partículas */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(180,140,255,0.6);
    animation: float-up 4s ease-in-out infinite;
  }
  @keyframes float-up {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-30px) scale(1.3); opacity: 0.9; }
  }
  .cosmos-glow {
    position: absolute; left: 50%; top: 40%;
    transform: translate(-50%,-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(120,80,200,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* ── Layout ── */
  .screen {
    position: relative; z-index: 2;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: 4rem 1.5rem 2rem;
    max-width: 480px; margin: 0 auto;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: clamp(1.5rem, 6vw, 2rem);
    line-height: 1.35;
    margin-bottom: 2.5rem;
    color: rgba(255,255,255,0.95);
  }

  /* Opções */
  .options { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2rem; }

  .option-btn {
    display: block;
    width: 100%;
    padding: 1rem 1.5rem;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 60px;
    color: rgba(255,255,255,0.9);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn.selected {
    background: rgba(255,255,255,0.95);
    color: #1a0533;
    border-color: transparent;
    font-weight: 500;
  }

  /* Escala de dor */
  .pain-scale {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.6rem;
    margin-bottom: 1.5rem;
  }
  .pain-btn {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: background 0.2s, color 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .pain-btn:active { transform: scale(0.92); }
  .pain-btn.selected {
    background: rgba(255,255,255,0.95);
    color: #3d1515;
    border-color: transparent;
    font-weight: 700;
  }
  .pain-labels {
    display: flex; justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2rem;
    padding: 0 0.2rem;
  }

  /* Mapa do corpo (onde dói) */
  .bodymap-toggle { display:flex; gap:0.5rem; margin-bottom:1rem; }
  .bm-tog-btn {
    flex:1; padding:0.6rem; border-radius:60px; cursor:pointer;
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25);
    color:rgba(255,255,255,0.75); font-family:'DM Sans',sans-serif; font-size:0.9rem;
  }
  .bm-tog-btn.active { background:rgba(255,255,255,0.9); color:#3d1515; font-weight:500; border-color:transparent; }
  .bodymap-wrap { display:flex; justify-content:center; margin-bottom:0.8rem; }
  .bodymap-wrap svg { width:min(240px,70vw); height:auto; touch-action:manipulation; }
  .bm-region {
    fill:rgba(255,255,255,0.1); stroke:rgba(255,255,255,0.3); stroke-width:0.8;
    cursor:pointer; transition:fill 0.15s, stroke 0.15s;
  }
  .bm-region.sel { fill:rgba(255,120,120,0.55); stroke:rgba(255,150,150,0.9); stroke-width:1.4; }
  .bm-chosen { text-align:center; font-size:0.85rem; color:rgba(255,255,255,0.7); min-height:1.3em; margin-bottom:0.8rem; }
  .bm-skip {
    display:block; margin:0 auto 0.5rem; padding:0.6rem 1.4rem; border-radius:60px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.2);
    color:rgba(255,255,255,0.6); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer;
  }

  /* Navegação */
  .nav { display: flex; gap: 1rem; margin-top: auto; padding-top: 1rem; }
  .btn-back {
    flex: 0 0 auto;
    padding: 0.9rem 1.5rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 60px;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }
  .btn-next {
    flex: 1;
    padding: 0.9rem 2rem;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 60px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s, opacity 0.2s;
  }
  .btn-next:disabled { opacity: 0.35; cursor: default; }
  .btn-next.ready { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }

  /* Tela final */
  #done-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    background: linear-gradient(160deg, #0a1a0a 0%, #1a3a1a 55%, #0f2a1a 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
    text-align: center;
  }
  #done-screen.visible { opacity: 1; pointer-events: all; }

  .done-check {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #4caf86, #2e7d5e);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 2rem;
    box-shadow: 0 0 40px rgba(76,175,134,0.4);
    animation: pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes pop-in {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .done-check svg { width: 44px; height: 44px; }

  .done-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 300;
    margin-bottom: 0.8rem;
  }
  .done-msg {
    font-size: 1rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    max-width: 300px;
  }
</style>
</head>
<body class="q1">

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:25%"></div></div>
<div class="decor" id="decor"></div>

<div class="screen" id="form-screen">
  <div class="question-text" id="question-text"></div>
  <div id="options-area"></div>
  <div class="nav" id="nav-area">
    <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">← Voltar</button>
    <button class="btn-next" id="btn-next" onclick="goNext()" disabled>Próxima →</button>
  </div>
</div>

<!-- Tela final -->
<div id="done-screen">
  <div class="done-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <div class="done-name" id="done-patient-name"></div>
  <div class="done-msg">Suas respostas foram recebidas.<br>Pode aguardar — a profissional já foi notificada!</div>
</div>

<script>
  const questions = [
    {
      key: 'sleep',
      text: 'Como foi o seu sono na última noite?',
      theme: 'q1',
      type: 'options',
      options: ['Dormi muito bem', 'Dormi razoavelmente', 'Dormi mal', 'Quase não dormi']
    },
    {
      key: 'pain',
      text: 'Qual o nível de desconforto ou dor que você sente agora?',
      theme: 'q2',
      type: 'scale',
      scaleMin: 0, scaleMax: 10
    },
    {
      key: 'pain_regions',
      text: 'Onde você sente a dor ou o desconforto? Toque no corpo.',
      theme: 'q2',
      type: 'bodymap',
      optional: true
    },
    {
      key: 'stress',
      text: 'Como está seu nível de estresse esta semana?',
      theme: 'q3',
      type: 'options',
      options: ['Tranquilo, me sinto bem', 'Um pouco tenso', 'Bastante estressado', 'No limite']
    },
    {
      key: 'reason',
      text: 'O que te traz aqui hoje?',
      theme: 'q4',
      type: 'options',
      options: ['Dor ou desconforto físico', 'Estresse e ansiedade', 'Manutenção e bem-estar', 'Continuação do tratamento']
    }
  ]

  // Regiões do corpo para o mapa de dor (iguais às telas do consultório)
  const BM_FRONT = [
    { id:'cabeca', label:'Cabeça', d:'M85,10 Q100,2 115,10 Q125,25 120,42 Q115,52 100,54 Q85,52 80,42 Q75,25 85,10Z' },
    { id:'pescoco', label:'Pescoço', d:'M90,54 Q100,58 110,54 L112,70 Q100,74 88,70Z' },
    { id:'torax', label:'Tórax', d:'M72,74 Q100,78 128,74 L132,130 Q100,136 68,130Z' },
    { id:'abdome', label:'Abdome', d:'M70,130 Q100,134 130,130 L128,168 Q100,172 72,168Z' },
    { id:'ombro-direito', label:'Ombro Direito', d:'M68,74 Q56,76 50,88 L54,108 Q62,112 70,104 L72,80Z' },
    { id:'ombro-esquerdo', label:'Ombro Esquerdo', d:'M132,74 Q144,76 150,88 L146,108 Q138,112 130,104 L128,80Z' },
    { id:'braco-direito', label:'Braço Direito', d:'M50,88 Q44,100 44,120 L52,128 Q60,120 56,108 L54,88Z' },
    { id:'braco-esquerdo', label:'Braço Esquerdo', d:'M150,88 Q156,100 156,120 L148,128 Q140,120 144,108 L146,88Z' },
    { id:'antebraco-direito', label:'Antebraço Direito', d:'M44,120 Q38,150 40,186 L50,186 L52,128Z' },
    { id:'antebraco-esquerdo', label:'Antebraço Esquerdo', d:'M156,120 Q162,150 160,186 L150,186 L148,128Z' },
    { id:'mao-direita', label:'Mão Direita', d:'M38,186 Q34,196 36,210 Q40,216 48,212 Q52,206 50,186Z' },
    { id:'mao-esquerda', label:'Mão Esquerda', d:'M162,186 Q166,196 164,210 Q160,216 152,212 Q148,206 150,186Z' },
    { id:'quadril', label:'Quadril', d:'M68,168 Q100,176 132,168 L128,200 Q100,208 72,200Z' },
    { id:'coxa-direita', label:'Coxa Direita', d:'M72,200 Q82,220 80,258 Q76,268 66,266 Q60,250 62,220 Z' },
    { id:'coxa-esquerda', label:'Coxa Esquerda', d:'M128,200 Q118,220 120,258 Q124,268 134,266 Q140,250 138,220 Z' },
    { id:'joelho-direito', label:'Joelho Direito', d:'M64,262 Q60,278 66,290 Q76,290 80,278 L80,258 Q76,268 66,266Z' },
    { id:'joelho-esquerdo', label:'Joelho Esquerdo', d:'M136,262 Q140,278 134,290 Q124,290 120,278 L120,258 Q124,268 134,266Z' },
    { id:'perna-direita', label:'Perna Direita', d:'M64,290 Q58,310 60,336 L74,336 Q80,312 80,286 Q76,290 66,290Z' },
    { id:'perna-esquerda', label:'Perna Esquerda', d:'M136,290 Q142,310 140,336 L126,336 Q120,312 120,286 Q124,290 134,290Z' },
    { id:'pe-direito', label:'Pé Direito', d:'M58,336 Q52,346 54,356 Q66,362 76,356 L74,336Z' },
    { id:'pe-esquerdo', label:'Pé Esquerdo', d:'M142,336 Q148,346 146,356 Q134,362 124,356 L126,336Z' },
  ]
  const BM_BACK = BM_FRONT.map(r => {
    if (r.id === 'torax')  return { ...r, label:'Costas superiores' }
    if (r.id === 'abdome') return { ...r, label:'Lombar' }
    return r
  })
  let bmView = 'front'

  let current = 0
  const answers = {}
  let sessionId = null
  let patientName = null

  // Lê session_id da URL
  const params = new URLSearchParams(location.search)
  sessionId = params.get('session')

  let payInfo = null   // { charge: {...}, pix: {...} }

  async function init() {
    if (!sessionId) {
      document.querySelector('.question-text').textContent = 'Link inválido. Por favor, escaneie o QR Code novamente.'
      document.getElementById('nav-area').style.display = 'none'
      return
    }

    // Nome do paciente
    try {
      const r = await fetch(`/api/sessions/${sessionId}`)
      if (r.ok) {
        const data = await r.json()
        if (data) patientName = data.patient_name
      }
    } catch (_) {}

    // Cobrança da sessão — só pergunta pagamento se houver valor a cobrar
    try {
      const r = await fetch(`/api/sessions/${sessionId}/pix`)
      if (r.ok) {
        payInfo = await r.json()
        if (payInfo?.charge?.required) {
          questions.push({
            key: 'payment_method',
            text: 'Como você prefere pagar a consulta?',
            theme: 'q5',
            type: 'payment'
          })
        }
      }
    } catch (_) {}

    renderQuestion(0)
  }

  init()

  function renderQuestion(index) {
    const q = questions[index]
    document.body.className = q.theme
    document.getElementById('question-text').textContent = q.text
    document.getElementById('progress-fill').style.width = `${((index + 1) / questions.length) * 100}%`
    document.getElementById('btn-back').style.display = index > 0 ? 'block' : 'none'

    const nextBtn = document.getElementById('btn-next')
    const answered = (q.key in answers) || q.optional
    nextBtn.disabled = !answered
    nextBtn.classList.toggle('ready', answered)
    nextBtn.textContent = index === questions.length - 1 ? 'Concluir ✓' : 'Próxima →'

    // Opções primeiro — garantidas antes de qualquer animação
    renderOptions(q)

    // Decor em tick separado: falha isolada, nunca bloqueia as opções
    setTimeout(function() { try { renderDecor(q.theme) } catch(e) {} }, 0)
  }

  function renderOptions(q) {
    const area = document.getElementById('options-area')
    area.innerHTML = ''

    if (q.type === 'options') {
      const div = document.createElement('div')
      div.className = 'options'
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'option-btn' + (answers[q.key] === opt ? ' selected' : '')
        btn.textContent = opt
        btn.onclick = () => selectOption(q.key, opt, btn, div)
        div.appendChild(btn)
      })
      area.appendChild(div)
    } else if (q.type === 'scale') {
      const grid = document.createElement('div')
      grid.className = 'pain-scale'
      for (let i = 0; i <= 10; i++) {
        const btn = document.createElement('button')
        btn.className = 'pain-btn' + (answers[q.key] === String(i) ? ' selected' : '')
        btn.textContent = i
        btn.onclick = () => selectPain(q.key, String(i), btn, grid)
        grid.appendChild(btn)
      }
      area.appendChild(grid)
      const labels = document.createElement('div')
      labels.className = 'pain-labels'
      labels.innerHTML = '<span>Sem dor</span><span>Dor intensa</span>'
      area.appendChild(labels)
    } else if (q.type === 'bodymap') {
      renderBodyMap(q, area)
    } else if (q.type === 'payment') {
      renderPayment(q, area)
    }
  }

  // ── Pagamento da consulta (Pix estático) ────────────────────────────────────
  const PAY_OPTIONS = ['Pix', 'Dinheiro', 'Cartão', 'Estou com dificuldade']

  function renderPayment(q, area) {
    const valor = payInfo?.charge?.amount
    const valorFmt = valor != null
      ? Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
      : ''

    area.innerHTML = `
      ${valor != null ? `
        <div class="pay-amount-top">
          <div class="lbl">Valor da consulta</div>
          <div class="val">${valorFmt}</div>
        </div>` : ''}
      <div class="options" id="pay-options"></div>
      <div id="pay-extra"></div>
    `

    const box = area.querySelector('#pay-options')
    PAY_OPTIONS.forEach(opt => {
      // Só oferece Pix se a profissional configurou a chave
      if (opt === 'Pix' && !payInfo?.pix?.enabled) return
      const btn = document.createElement('button')
      btn.className = 'option-btn' + (answers[q.key] === opt ? ' selected' : '')
      btn.textContent = opt
      btn.onclick = () => {
        box.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
        btn.classList.add('selected')
        answers[q.key] = opt
        if (opt !== 'Pix') delete answers['pix_declared']
        renderPayExtra(opt)
        enableNext()
      }
      box.appendChild(btn)
    })

    if (answers[q.key]) renderPayExtra(answers[q.key])
  }

  function renderPayExtra(opt) {
    const extra = document.getElementById('pay-extra')
    if (!extra) return

    if (opt === 'Pix' && payInfo?.pix?.enabled) {
      const pix = payInfo.pix

      // Pagamento já confirmado pelo provedor
      if (pix.already_paid || answers['pix_declared'] === 'confirmado') {
        extra.innerHTML = `<div class="pay-confirmed">✅ Pagamento confirmado!<br><span>Obrigado — está tudo certo.</span></div>`
        answers['pix_declared'] = 'confirmado'
        return
      }

      const jaPagou = answers['pix_declared'] === 'sim'
      extra.innerHTML = `
        <div class="pay-panel">
          <img src="${pix.qr_code_base64}" alt="QR Code Pix">
          <div class="hint">Abra o app do seu banco, escolha <b>Pix &rsaquo; Ler QR Code</b> e aponte para o código acima.</div>
          <button class="pay-copy-btn" id="btn-copy-pix">📋 Copiar código Pix (copia e cola)</button>
          ${pix.key ? `
            <div class="pay-key">
              Ou pague pela chave:<br>
              <b>${pix.key}</b>
              ${pix.name ? `<br><span style="opacity:0.75">${pix.name}</span>` : ''}
            </div>` : ''}
        </div>
        ${pix.auto_confirm
          ? `<div class="pay-waiting" id="pay-waiting">
               <span class="dot"></span><span class="dot"></span><span class="dot"></span>
               Aguardando a confirmação do pagamento...
             </div>`
          : `<button class="pay-done-btn ${jaPagou ? 'done' : ''}" id="btn-ja-paguei">
               ${jaPagou ? '✓ Pagamento informado' : 'Já paguei'}
             </button>`}
      `
      document.getElementById('btn-copy-pix').onclick = () => copyPix(pix.brcode)

      if (pix.auto_confirm) {
        startPaymentPolling()
      } else {
        document.getElementById('btn-ja-paguei').onclick = (e) => {
          answers['pix_declared'] = 'sim'
          e.target.classList.add('done')
          e.target.textContent = '✓ Pagamento informado'
        }
      }
      return
    }

    if (opt === 'Estou com dificuldade') {
      extra.innerHTML = `
        <div class="pay-help">
          Sem problema. 🙂<br>
          A profissional foi avisada e vai combinar o pagamento com você pessoalmente.
        </div>`
      return
    }

    if (opt === 'Dinheiro' || opt === 'Cartão') {
      extra.innerHTML = `
        <div class="pay-help">
          Combinado! Você paga na recepção com a profissional.
        </div>`
      return
    }

    extra.innerHTML = ''
  }

  // Com o Mercado Pago o pagamento se confirma sozinho — só perguntamos ao servidor
  let payPollTimer = null
  function startPaymentPolling() {
    if (payPollTimer) return
    payPollTimer = setInterval(async () => {
      try {
        const r = await fetch(`/api/sessions/${sessionId}/payment-status`)
        if (!r.ok) return
        const d = await r.json()
        if (d.status === 'pago') {
          clearInterval(payPollTimer)
          payPollTimer = null
          answers['pix_declared'] = 'confirmado'
          const extra = document.getElementById('pay-extra')
          if (extra) {
            extra.innerHTML = `<div class="pay-confirmed">✅ Pagamento confirmado!<br><span>Obrigado — está tudo certo.</span></div>`
          }
        }
      } catch (_) {}
    }, 4000)
  }

  // Copia o "copia e cola" — usa a API moderna e cai para o método antigo se falhar
  async function copyPix(code) {
    const btn = document.getElementById('btn-copy-pix')
    let ok = false
    try {
      await navigator.clipboard.writeText(code)
      ok = true
    } catch (_) {
      try {
        const ta = document.createElement('textarea')
        ta.value = code
        ta.style.position = 'fixed'
        ta.style.opacity = '0'
        document.body.appendChild(ta)
        ta.select()
        ok = document.execCommand('copy')
        document.body.removeChild(ta)
      } catch (_) {}
    }
    if (btn) {
      btn.classList.toggle('copied', ok)
      btn.textContent = ok ? '✓ Código copiado!' : 'Não foi possível copiar — use o QR'
      setTimeout(() => {
        btn.classList.remove('copied')
        btn.textContent = '📋 Copiar código Pix (copia e cola)'
      }, 2600)
    }
  }

  // Mapa do corpo — múltipla seleção de regiões
  const painSel = new Set()

  function syncPainAnswer() {
    answers['pain_regions'] = [...painSel].join(', ')
    const chosen = document.getElementById('bm-chosen')
    if (chosen) chosen.textContent = painSel.size ? [...painSel].join(' · ') : 'Nenhuma região selecionada (opcional)'
    enableNext()
  }

  function renderBodyMap(q, area) {
    if (answers[q.key]) {
      answers[q.key].split(',').map(s => s.trim()).filter(Boolean).forEach(l => painSel.add(l))
    }
    area.innerHTML = `
      <div class="bodymap-toggle">
        <button type="button" class="bm-tog-btn ${bmView==='front'?'active':''}" data-v="front">Frente</button>
        <button type="button" class="bm-tog-btn ${bmView==='back'?'active':''}" data-v="back">Costas</button>
      </div>
      <div class="bodymap-wrap"><svg id="bm-svg" viewBox="0 0 200 370" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <div class="bm-chosen" id="bm-chosen"></div>
      <button type="button" class="bm-skip" id="bm-skip">Não tenho dor localizada</button>
    `
    area.querySelectorAll('.bm-tog-btn').forEach(b => {
      b.onclick = () => { bmView = b.dataset.v; renderBodyMap(q, area) }
    })
    area.querySelector('#bm-skip').onclick = () => { painSel.clear(); drawBM(); syncPainAnswer() }
    drawBM()
    syncPainAnswer()
  }

  function drawBM() {
    const svg = document.getElementById('bm-svg')
    if (!svg) return
    svg.innerHTML = ''
    const regions = bmView === 'front' ? BM_FRONT : BM_BACK
    regions.forEach(r => {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path')
      p.setAttribute('d', r.d)
      p.setAttribute('class', 'bm-region' + (painSel.has(r.label) ? ' sel' : ''))
      p.addEventListener('click', () => {
        if (painSel.has(r.label)) painSel.delete(r.label)
        else painSel.add(r.label)
        p.classList.toggle('sel')
        syncPainAnswer()
      })
      svg.appendChild(p)
    })
  }

  function selectOption(key, value, btn, container) {
    container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
    btn.classList.add('selected')
    answers[key] = value
    enableNext()
  }

  function selectPain(key, value, btn, container) {
    container.querySelectorAll('.pain-btn').forEach(b => b.classList.remove('selected'))
    btn.classList.add('selected')
    answers[key] = value
    enableNext()
  }

  function enableNext() {
    const btn = document.getElementById('btn-next')
    btn.disabled = false
    btn.classList.add('ready')
  }

  function goNext() {
    if (current < questions.length - 1) {
      current++
      renderQuestion(current)
    } else {
      submitForm()
    }
  }

  function goBack() {
    if (current > 0) {
      current--
      renderQuestion(current)
    }
  }

  async function submitForm() {
    const btn = document.getElementById('btn-next')
    btn.disabled = true
    btn.textContent = 'Enviando...'

    try {
      await fetch(`/api/sessions/${sessionId}/answers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers })
      })
    } catch (_) {}

    document.getElementById('done-patient-name').textContent = patientName || 'Obrigado!'
    document.getElementById('done-screen').classList.add('visible')
  }

  // ─── Decorações temáticas ───────────────────────────────────────────────

  let decorBuilt = ''

  function renderDecor(theme) {
    if (decorBuilt === theme) return
    decorBuilt = theme
    const d = document.getElementById('decor')
    d.innerHTML = ''

    if (theme === 'q1') buildQ1Decor(d)
    else if (theme === 'q2') buildQ2Decor(d)
    else if (theme === 'q3') buildQ3Decor(d)
    else if (theme === 'q4') buildQ4Decor(d)
  }

  function buildQ1Decor(d) {
    // Estrelas
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div')
      s.className = 'star'
      const sz = Math.random() * 2.5 + 0.5
      const dur = (Math.random() * 4 + 2).toFixed(1) + 's'
      const delay = (Math.random() * 5).toFixed(1) + 's'
      s.style.width = sz + 'px'
      s.style.height = sz + 'px'
      s.style.top = (Math.random() * 100) + '%'
      s.style.left = (Math.random() * 100) + '%'
      s.style.animationDuration = dur
      s.style.animationDelay = delay
      d.appendChild(s)
    }
    // Lua
    const moon = document.createElement('div')
    moon.className = 'moon'
    moon.innerHTML = '<div class="moon-body"><div class="moon-shadow"></div></div>'
    d.appendChild(moon)
    // Nuvens
    const clouds = [['-5%','60%','200px','60px'],['80%','70%','160px','50px']]
    clouds.forEach(([t, l, w, h]) => {
      const c = document.createElement('div')
      c.className = 'cloud'
      c.style.cssText = `top:${t};left:${l};width:${w};height:${h}`
      d.appendChild(c)
    })
  }

  function buildQ2Decor(d) {
    // Centro de brilho
    const center = document.createElement('div')
    center.className = 'pulse-center'
    d.appendChild(center)
    // Anéis
    for (let i = 0; i < 5; i++) {
      const r = document.createElement('div')
      r.className = 'pulse-ring'
      const sz = 120 + i * 40
      r.style.width = sz + 'px'
      r.style.height = sz + 'px'
      r.style.top = '45%'
      r.style.left = '50%'
      r.style.animationDuration = (1.8 + i * 0.4) + 's'
      r.style.animationDelay = (i * 0.36) + 's'
      d.appendChild(r)
    }
  }

  function buildQ3Decor(d) {
    const speeds = [8, 11, 14, 6]
    speeds.forEach((spd, i) => {
      const w = document.createElement('div')
      w.className = 'wave'
      w.style.bottom = (i * 18) + 'px'
      w.style.opacity = (0.5 - i * 0.08)
      w.style.animationDuration = spd + 's'
      w.style.animationDelay = (i * -2) + 's'
      d.appendChild(w)
    })
  }

  function buildQ4Decor(d) {
    const glow = document.createElement('div')
    glow.className = 'cosmos-glow'
    d.appendChild(glow)
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div')
      p.className = 'particle'
      const sz = Math.random() * 4 + 2
      p.style.width = sz + 'px'
      p.style.height = sz + 'px'
      p.style.top = (Math.random() * 100) + '%'
      p.style.left = (Math.random() * 100) + '%'
      p.style.animationDuration = (Math.random() * 4 + 3).toFixed(1) + 's'
      p.style.animationDelay = (Math.random() * 4).toFixed(1) + 's'
      d.appendChild(p)
    }
  }
</script>
</body>
