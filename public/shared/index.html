<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh; overflow:hidden;
  font-family:'DM Sans', sans-serif;
  color:#fff;
  transition: background 1s ease;
}

/* Tons de fundo por região */
body.bg-default  { background: #0c0c14; }
body.bg-lower    { background: #0c0c1a; }  /* joelho, pé, tornozelo */
body.bg-lumbar   { background: #0f0c0a; }  /* lombar, quadril */
body.bg-upper    { background: #0a0f0c; }  /* ombro, pescoço, cabeça */
body.bg-torso    { background: #0c0c14; }  /* tórax, abdome */

/* ── Estado Idle ── */
#idle-screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
  transition: opacity 0.8s;
}
#idle-screen.hidden { opacity:0; pointer-events:none; }

.idle-glow {
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:600px; height:600px;
  background:radial-gradient(circle, rgba(80,50,150,0.15) 0%, transparent 70%);
  border-radius:50%;
  animation:glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6;}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:1;}
}

.idle-particles { position:absolute; inset:0; pointer-events:none; }
.idle-particle {
  position:absolute; border-radius:50%;
  background:rgba(180,140,255,0.5);
  animation:float var(--dur) ease-in-out infinite;
}
@keyframes float {
  0%,100%{transform:translateY(0) scale(1);opacity:0.3;}
  50%{transform:translateY(-40px) scale(1.2);opacity:0.8;}
}

.idle-clinic {
  position:relative;
  font-family:'Playfair Display', serif;
  font-size:clamp(2.5rem, 5vw, 4rem);
  font-weight:300;
  letter-spacing:0.06em;
  color:rgba(255,255,255,0.8);
  margin-bottom:1rem;
  text-align:center;
}
.idle-welcome {
  font-size:clamp(1rem, 2vw, 1.4rem);
  color:rgba(255,255,255,0.35);
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* ── Estado Ativo ── */
#active-screen {
  position:fixed; inset:0;
  display:grid; grid-template-columns:1fr 1.4fr;
  opacity:0; pointer-events:none;
  transition:opacity 0.8s;
  z-index:10;
}
#active-screen.visible { opacity:1; pointer-events:all; }

/* Coluna esquerda — anatômica */
.anatomy-col {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem 1.5rem;
  border-right:1px solid rgba(255,255,255,0.05);
  position:relative;
  overflow:hidden;
}

.anatomy-col::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 40%, rgba(255,180,50,0.04) 0%, transparent 60%);
  pointer-events:none;
}

#body-svg-shared {
  width:min(200px, 30vw);
  height:auto;
  filter:drop-shadow(0 0 20px rgba(255,180,50,0.1));
}

.region-name {
  margin-top:1.5rem;
  font-size:clamp(0.75rem, 1.2vw, 0.95rem);
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:rgba(255,180,50,0.7);
  text-align:center;
}

/* Região selecionada com glow pulsante */
.svg-region {
  fill:rgba(255,255,255,0.06);
  stroke:rgba(255,255,255,0.12);
  stroke-width:0.8;
  transition:fill 0.4s, stroke 0.4s, filter 0.4s;
}
.svg-region.highlighted {
  fill:rgba(255,180,50,0.22);
  stroke:rgba(255,180,50,0.7);
  stroke-width:1.2;
  animation:region-pulse 2s ease-in-out infinite;
}
@keyframes region-pulse {
  0%,100%{filter:drop-shadow(0 0 4px rgba(255,180,50,0.4));}
  50%{filter:drop-shadow(0 0 12px rgba(255,180,50,0.8));}
}

/* Linhas anatômicas de detalhe */
.detail-path {
  fill:none;
  stroke:rgba(255,180,50,0.35);
  stroke-width:0.8;
  stroke-linecap:round;
}

/* Coluna direita — explicação */
.explanation-col {
  display:flex; flex-direction:column;
  justify-content:center;
  padding:3rem 3.5rem 3rem 3rem;
  overflow:hidden;
}

.explanation-header {
  font-size:clamp(0.65rem, 1vw, 0.8rem);
  text-transform:uppercase;
  letter-spacing:0.18em;
  color:rgba(255,255,255,0.25);
  margin-bottom:1.5rem;
}

.explanation-title {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(1.6rem, 3vw, 2.4rem);
  font-weight:300;
  color:rgba(255,255,255,0.9);
  margin-bottom:1.5rem;
  line-height:1.25;
}

.explanation-text {
  font-size:clamp(1rem, 1.5vw, 1.25rem);
  line-height:1.8;
  color:rgba(255,255,255,0.72);
  min-height:8em;
}

.explanation-sep {
  height:1px;
  background:linear-gradient(90deg, rgba(255,180,50,0.3), transparent);
  margin:1.5rem 0;
}

/* Rodapé */
.shared-footer {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; justify-content:space-between;
  padding:0.8rem 2rem;
  border-top:1px solid rgba(255,255,255,0.04);
  font-size:0.75rem;
  color:rgba(255,255,255,0.2);
  z-index:20;
  letter-spacing:0.05em;
}

/* ── Tela Acupuntura 3D ── */
#acu-screen {
  position:fixed; inset:0;
  display:none; grid-template-columns: 1fr 340px;
  z-index:10;
  background: #060610;
}
#acu-screen.visible { display:grid; }

#acu-canvas-shared {
  width:100%; height:100%;
  position:relative;
}

.acu-info-col {
  display:flex; flex-direction:column;
  justify-content:center;
  padding:3rem 2.5rem;
  border-left:1px solid rgba(255,255,255,0.05);
  background:rgba(0,0,0,0.3);
  overflow:hidden;
}

.acu-info-label {
  font-size:0.68rem; text-transform:uppercase;
  letter-spacing:0.18em;
  color:rgba(255,255,255,0.22);
  margin-bottom:1.4rem;
}

.acu-info-title {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(1.4rem, 2.5vw, 2rem);
  font-weight:300;
  color:rgba(255,255,255,0.88);
  margin-bottom:1.6rem;
  line-height:1.25;
}

.acu-pts-list {
  display:flex; flex-direction:column; gap:0.55rem;
  overflow-y:auto;
  max-height:60vh;
}

.acu-pt-item {
  display:flex; align-items:flex-start; gap:0.6rem;
  padding:0.55rem 0.8rem;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
  animation: fadeInUp 0.4s ease both;
}
@keyframes fadeInUp {
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.acu-pt-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0; margin-top:0.22rem;
}
.acu-pt-code {
  font-size:0.82rem; font-weight:600;
  color:rgba(255,255,255,0.9);
  min-width:44px;
}
.acu-pt-texts { display:flex; flex-direction:column; gap:0.12rem; }
.acu-pt-pinyin { font-size:0.8rem; color:rgba(255,255,255,0.6); }
.acu-pt-name-pt { font-size:0.72rem; color:rgba(255,255,255,0.35); font-style:italic; }

.acu-sep {
  height:1px;
  background:linear-gradient(90deg,rgba(120,200,180,0.25),transparent);
  margin:1.2rem 0;
}
</style>
</head>

function getBgClass(regionId) {
  if (!regionId) return 'bg-default'
  const lower = ['joelho-direito','joelho-esquerdo','pe-direito','pe-esquerdo','tornozelo-direito','tornozelo-esquerdo','panturrilha-direita','panturrilha-esquerda']

  const upper = ['ombro-direito','ombro-esquerdo','pescoco','cabeca']
  const torso = ['torax','abdome']
  if (lower.includes(regionId)) return 'bg-lower'
  if (lumbar.includes(regionId)) return 'bg-lumbar'
  if (upper.includes(regionId)) return 'bg-upper'
  if (torso.includes(regionId)) return 'bg-torso'
  return 'bg-default'
}

  const cont = document.getElementById('idle-particles')

    p.className = 'idle-particle'
    const sz = Math.random() * 5 + 2
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --dur:${(Math.random()*5+3).toFixed(1)}s;
      animation-delay:${(Math.random()*6).toFixed(1)}s;
    `
    cont.appendChild(p)
  }
})()

// ── SVG base ────────────────────────────────────────────────────────────────

function buildBaseSVG(regions, highlightId) {
  const svg = document.getElementById('body-svg-shared')
  svg.innerHTML = ''

  regions.forEach(r => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path')
    path.setAttribute('d', r.d)
    path.setAttribute('class', 'svg-region' + (r.id === highlightId ? ' highlighted' : ''))
    path.setAttribute('data-id', r.id)
    svg.appendChild(path)
  })

  // Adiciona detalhes anatômicos da região em destaque
  if (highlightId && DETAIL_PATHS[highlightId]) {
    DETAIL_PATHS[highlightId].forEach(d => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path')
      p.setAttribute('d', d)
      p.setAttribute('class', 'detail-path')
      svg.appendChild(p)
    })
  }
}

// ── Typewriter ───────────────────────────────────────────────────────────────

function typewriterEffect(text, el, delay = 28) {
  if (typewriterTimer) clearInterval(typewriterTimer)
  el.textContent = ''
  let i = 0
  typewriterTimer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i]
      i++
    } else {
      clearInterval(typewriterTimer)
    }
  }, delay)
}

// ── Polling ──────────────────────────────────────────────────────────────────

async function init() {
  // Tenta recuperar sessão salva
  const saved = localStorage.getItem('shared_session')
  if (saved) {
    try { sessionId = JSON.parse(saved).id } catch (_) {}
  }

  // Se não tiver sessão, busca a mais recente confirmada
  if (!sessionId) {
    try {
      const r = await fetch('/api/sessions/latest/acknowledged')
      if (r.ok) {
        const s = await r.json()
        sessionId = s.id
        localStorage.setItem('shared_session', JSON.stringify({ id: s.id }))
      }
    } catch (_) {}
  }

  buildBaseSVG(REGIONS_FRONT, null)
  startSharedStream()
}

// SSE (item 13) com fallback para polling
let sharedES = null, sharedSSEok = false, fallbackTimer = null

function handlePublic(d) {
  const sh = d.shared || {}
  if (sh.session_id && sh.session_id !== sessionId) {
    sessionId = sh.session_id
    lastEventId = null
    localStorage.setItem('shared_session', JSON.stringify({ id: sessionId }))
  }
  if (sh.anatomy && sh.anatomy.id && sh.anatomy.id !== lastEventId) {
    lastEventId = sh.anatomy.id
    showActiveState(sh.anatomy)
  }
}

function startSharedStream() {
  if (!window.EventSource) { startSharedPolling(); return }
  try {
    sharedES = new EventSource('/api/stream/public')
    sharedES.onopen = () => {
      sharedSSEok = true
      if (fallbackTimer) { clearInterval(fallbackTimer); fallbackTimer = null }
    }
    sharedES.onmessage = (e) => {
      let d; try { d = JSON.parse(e.data) } catch (_) { return }
      if (d.type === 'public') handlePublic(d)
    }
    sharedES.onerror = () => { if (!sharedSSEok) startSharedPolling() }
  } catch (_) { startSharedPolling() }
}

function startSharedPolling() {
  if (fallbackTimer) return
  if (sessionId) pollAnatomyEvent()
  fallbackTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/sessions/latest/acknowledged')
      if (r.ok) {
        const s = await r.json()
        if (s.id !== sessionId) {
          sessionId = s.id
          lastEventId = null
          localStorage.setItem('shared_session', JSON.stringify({ id: s.id }))
        }
      }
    } catch (_) {}
    if (sessionId) pollAnatomyEvent()
  }, 2000)
}

async function pollAnatomyEvent() {
  if (!sessionId) return
  try {
    const r = await fetch(`/api/anatomy/latest/${sessionId}`)
    if (!r.ok) return
    const event = await r.json()
    if (event && event.id && event.id !== lastEventId) {
      lastEventId = event.id
      showActiveState(event)
    }
  } catch (_) {}
}

function showActiveState(event) {
  // Evento de acupuntura → modo 3D
  if (event.region === '__acupuncture__') {
    showAcupunctureState(event)
    return
  }

  // Esconde tela de acupuntura se estava ativa
  document.getElementById('acu-screen').classList.remove('visible')

  // Determina se frente ou costas baseado na presença da região "lombar"
  const isBack = event.region === 'Lombar' || event.region === 'Costas superiores'
  const regions = isBack ? REGIONS_BACK : REGIONS_FRONT

  // Encontra o ID da região pelo label
  const regionData = regions.find(r => r.label === event.region)
  const regionId = regionData?.id || null

  // Tema de fundo
  document.body.className = getBgClass(regionId)

  // Reconstrói SVG com destaque
  buildBaseSVG(regions, regionId)
  document.getElementById('shared-region-name').textContent = event.region

  // Texto
  document.getElementById('expl-title').textContent = event.region
  typewriterEffect(event.ai_explanation || '', document.getElementById('expl-text'))

  // Exibe tela ativa
  document.getElementById('idle-screen').classList.add('hidden')
  document.getElementById('active-screen').classList.add('visible')
}

// ── Modo Acupuntura 3D ────────────────────────────────────────────────────────

let acuSharedViewer = null

function showAcupunctureState(event) {
  let points = []
  try { points = JSON.parse(event.problem || '[]') } catch (_) {}

  // Oculta telas normais, exibe tela de acupuntura
  document.body.className = 'bg-default'
  document.getElementById('idle-screen').classList.add('hidden')
  document.getElementById('active-screen').classList.remove('visible')
  document.getElementById('acu-screen').classList.add('visible')

  // Inicializa viewer Three.js (só na primeira chamada)
  const container = document.getElementById('acu-canvas-shared')
  if (!acuSharedViewer) {
    if (!window.AcupunctureViewer) {
      setTimeout(() => showAcupunctureState(event), 350)
      return
    }
    acuSharedViewer = new window.AcupunctureViewer(container, {
      isDoctor:   false,
      autoRotate: true,
    })
  }

  acuSharedViewer.setSelectedPoints(points)
  _renderAcuInfoPanel(points)
}

function _renderAcuInfoPanel(pointIds) {
  const title = document.getElementById('acu-info-title')
  const list  = document.getElementById('acu-pts-list')
  list.innerHTML = ''

  if (!pointIds.length) {
    title.textContent = 'Nenhum ponto ativo'
    return
  }

  title.textContent = `${pointIds.length} ponto${pointIds.length > 1 ? 's' : ''} ativo${pointIds.length > 1 ? 's' : ''}`

  pointIds.forEach((id, idx) => {
    let ptData = null
    const baseId = id.replace('-E', '')
    for (const m of (window.ACU_MERIDIANS || [])) {
      const p = m.points.find(p => p.id === baseId)
      if (p) { ptData = { ...p, color: m.color, mName: m.name }; break }
    }
    const side = id.endsWith('-E') ? 'Esq.' : 'Dir.'
    const item = document.createElement('div')
    item.className = 'acu-pt-item'
    item.style.animationDelay = `${idx * 0.06}s`
    item.innerHTML = `
      <div class="acu-pt-dot" style="background:${ptData?.color || '#aaa'}"></div>
      <div class="acu-pt-texts">
        <div style="display:flex;gap:0.5rem;align-items:baseline">
          <span class="acu-pt-code">${id}</span>
          <span style="font-size:0.68rem;color:rgba(255,255,255,0.3)">${side}</span>
        </div>
        <div class="acu-pt-pinyin">${ptData?.name || '—'}</div>
        <div class="acu-pt-name-pt">${ptData?.pt || ''}</div>
      </div>
    `
    list.appendChild(item)
  })
}

init()

</script>
